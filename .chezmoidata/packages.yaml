packagesyml:
    mise:
        command: curl -fsSL https://mise.run | sh 
    atuin:
        command: mise use -g atuin
        depends: mise
    starship:
        command: mise use -g starship
        depends: mise
    uv:
        command: mise use -g uv
        depends: mise
    bat:
        command: mise use -g bat
        depends: mise
    eza:
        command: mise use -g eza
        depends: mise
    pre-commit:
        command: mise use -g pre-commit
        depends: mise
    micro:
        command: mise use -g aqua:micro-editor/micr
        depends: mise
    gum:
        command: mise use -g gum
        depends: mise
    gh:
        commmand: mise use -g gh
        depends: mise
    direnv:
        command: mise use -g direnv
        depends: mise
    httpie:
        command: uv tool install httpie
        depends: uv
    thefuck:
        command: uv tool install thefuck --with setuptools --python 3.11
        depends: uv
