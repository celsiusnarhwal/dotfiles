packages:
  - name: mise
    command: curl -fsSL https://mise.run | sh

  - name: atuin
    command: mise use -g atuin
    depends: ["mise"]

  - name: starship
    command: mise use -g starship
    depends: ["mise"]

  - name: uv
    command: mise use -g uv
    depends: ["mise"]

  - name: bat
    command: mise use -g bat
    depends: ["mise"]

  - name: eza
    command: mise use -g eza
    depends: ["mise"]

  - name: pre-commit
    command: mise use -g pre-commit
    depends: ["mise"]

  - name: micro
    command: mise use -g aqua:micro-editor/micro
    depends: ["mise"]

  - name: gum
    command: mise use -g gum
    depends: ["mise"]

  - name: gh
    command: mise use -g gh
    depends: ["mise"]

  - name: direnv
    command: mise use -g  direnv
    depends: ["mise"]
    
  - name: httpie
    command: uv tool install httpie
    depends: ["uv"]

  - name: thefuck
    command: uv tool install thefuck --with setuptools --python 3.11
    depends: ["uv"]
