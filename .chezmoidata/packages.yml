packages:
  - name: mise
    command: curl -fsSL https://mise.run | sh

  - name: atuin
    command: mise use -g atuin
    after: ["mise"]

  - name: starship
    command: mise use -g starship
    after: ["mise"]

  - name: uv
    command: mise use -g uv
    after: ["mise"]

  - name: bat
    command: mise use -g bat
    after: ["mise"]

  - name: bat-extras
    command: mise use -g bat-extras
    after: ["bat"]

  - name: eza
    command: mise use -g eza
    after: ["mise"]

  - name: pre-commit
    command: mise use -g pre-commit
    after: ["mise"]

  - name: micro
    command: mise use -g aqua:micro-editor/micro
    after: ["mise"]

  - name: gum
    command: mise use -g gum
    after: ["mise"]

  - name: gh
    command: mise use -g gh
    after: ["mise"]

  - name: direnv
    command: mise use -g  direnv
    after: ["mise"]
    
  - name: httpie
    command: mise exec uv -- uv tool install httpie
    after: ["uv"]

  - name: thefuck
    command: mise exec uv -- uv tool install thefuck --with setuptools --python 3.11
    after: ["uv"]

  - name: glow
    command: mise use -g glow
    after: ["mise"]

  - name: dotnet
    command: mise use -g dotnet
    after: ["mise"]

  - name: git-credential-manager
    command: mise use -g dotnet:git-credential-manager
    after: ["dotnet"]

  - name: xonsh
    command: mise exec uv -- uv tool install xonsh
    after: ["uv"]

  - name: ripgrep
    command: mise use -g ripgrep
    after: ["mise"]

  - name: delta
    command: mise use -g delta
    after: ["mise"]

  - name: jq
    command: mise use -g jq
    after: ["mise"]

  - name: sd
    command: mise use -g sd
    after: ["mise"]

  - name: go
    command: mise use -g go
    after: ["mise"]

  - name: moor
    command: mise use -g go:github.com/walles/moor/v2/cmd/moor@latest
    after: ["go"]

  - name: lazygit
    command: mise use -g lazygit
    after: ["mise"]
    
